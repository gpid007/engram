# Local development config for testing ONNX embedder without full backend stack
server:
  mcp_stdio: true
  http_addr: ":8080"

embedding:
  provider: onnx
  model_dir: /Users/greg/git/engram/models/nomic-embed-text-v1.5
  max_seq_len: 8192
  dim: 768
  batch: 32
  timeout_ms: 5000
  retries: 3

vector:
  provider: noop  # No-op vector store for local testing

meta:
  provider: memory  # In-memory metadata store for local testing

retrieval:
  vector_k: 20
  bm25_k: 20
  rerank_k: 20
  final_k: 5
  rrf_k: 60
  vector_floor: 0.25

rerank:
  enabled: false  # Disable reranker for local testing

logging:
  level: debug
  format: json

graph:
  enabled: false  # Disable graph for local testing
