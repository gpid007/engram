services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  init-models:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollamadata:/root/.ollama
      - ./init:/init
    entrypoint: ["/bin/sh", "/init/pull-models.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  model-init:
    image: curlimages/curl:latest
    user: root
    volumes:
      - models:/models
      - ../scripts/fetch-models.sh:/fetch-models.sh:ro
    environment:
      MODEL_DIR: /models/nomic-embed-text-v1.5
      HF_REVISION: ${HF_REVISION:-16999335555c8808544a0344d2d4d9834ba70404}
    entrypoint: ["sh", "/fetch-models.sh"]
    restart: "no"

  neo4j:
    image: neo4j:5-community
    container_name: engram-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-engrampass}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  engram:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      init-models:
        condition: service_completed_successfully
    environment:
      ENGRAM_META_DSN: postgres://engram:engram@postgres:5432/engram?sslmode=disable
      ENGRAM_VECTOR_ADDR: qdrant:6334
      ENGRAM_EMBEDDING_BASE_URL: http://ollama:11434
      ENGRAM_EMBEDDING_MODEL_DIR: /models/nomic-embed-text-v1.5
      ENGRAM_EMBEDDING_PROVIDER: ${ENGRAM_EMBEDDING_PROVIDER:-ollama}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-engrampass}
      ENGRAM_GRAPH_PROVIDER: ${ENGRAM_GRAPH_PROVIDER:-none}
      ENGRAM_GRAPH_URI: bolt://neo4j:7687
      ENGRAM_GRAPH_USERNAME: neo4j
      ENGRAM_GRAPH_PASSWORD_ENV: NEO4J_PASSWORD
    volumes:
      - models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  qdrantdata:
  ollamadata:
  neo4jdata:
  models:
