services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # Ollama is no longer needed — using local ONNX inference instead.
  # To use Ollama: set ENGRAM_EMBEDDING_PROVIDER=ollama and uncomment below.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollamadata:/root/.ollama
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
  #     interval: 5s
  #     timeout: 10s
  #     retries: 20
  #
  # init-models:
  #   image: ollama/ollama:latest
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   volumes:
  #     - ollamadata:/root/.ollama
  #     - ./init:/init
  #   entrypoint: ["/bin/sh", "/init/pull-models.sh"]
  #   environment:
  #     OLLAMA_HOST: http://ollama:11434
  #   restart: "no"

  model-init:
    image: curlimages/curl:latest
    user: root
    volumes:
      - models:/models
      - ../scripts/fetch-models.sh:/fetch-models.sh:ro
    environment:
      MODEL_DIR: /models/nomic-embed-text-v1.5
      HF_REVISION: ${HF_REVISION:-e9b6763023c676ca8431644204f50c2b100d9aab}
    entrypoint: ["sh", "/fetch-models.sh"]
    restart: "no"

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    container_name: engram-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-engrampass}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4jdata:/data

  engram:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - qdrant
      - model-init
    environment:
      ENGRAM_META_DSN: postgres://engram:engram@postgres:5432/engram?sslmode=disable
      ENGRAM_VECTOR_ADDR: qdrant:6334
      ENGRAM_EMBEDDING_BASE_URL: http://ollama:11434
      ENGRAM_EMBEDDING_MODEL_DIR: /models/nomic-embed-text-v1.5
      ENGRAM_EMBEDDING_PROVIDER: ${ENGRAM_EMBEDDING_PROVIDER:-onnx}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-engrampass}
      ENGRAM_GRAPH_PROVIDER: ${ENGRAM_GRAPH_PROVIDER:-none}
      ENGRAM_GRAPH_URI: bolt://neo4j:7687
      ENGRAM_GRAPH_USERNAME: neo4j
      ENGRAM_GRAPH_PASSWORD_ENV: NEO4J_PASSWORD
    volumes:
      - models:/models:ro

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
  models:
