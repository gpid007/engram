services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  init-models:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollamadata:/root/.ollama
      - ./init:/init
    entrypoint: ["/bin/sh", "/init/pull-models.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  engram:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      init-models:
        condition: service_completed_successfully
    environment:
      ENGRAM_META_DSN: postgres://engram:engram@postgres:5432/engram?sslmode=disable
      ENGRAM_VECTOR_ADDR: qdrant:6334
      ENGRAM_EMBEDDING_BASE_URL: http://ollama:11434
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  qdrantdata:
  ollamadata:
