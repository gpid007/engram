name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (non-Docker)
        run: |
          go test ./cmd/... -count=1 -timeout 120s
          go test ./internal/chunk/... -count=1 -timeout 120s
          go test ./internal/config/... -count=1 -timeout 120s
          go test ./internal/embed/... -count=1 -timeout 120s
          go test ./internal/fusion/... -count=1 -timeout 120s
          go test ./internal/graph/... -count=1 -timeout 120s
          go test ./internal/httpapi/... -count=1 -timeout 120s
          go test ./internal/mcp/... -count=1 -timeout 120s
          go test ./internal/memory/... -count=1 -timeout 120s
          go test ./internal/rerank/... -count=1 -timeout 120s

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Skip if the commit message contains [skip-integration]
    if: "!contains(github.event.head_commit.message, '[skip-integration]')"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: engram
          POSTGRES_PASSWORD: engram
          POSTGRES_DB: engram
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run integration tests
        run: go test -tags integration ./test/integration/... -v -timeout 300s
        env:
          POSTGRES_DSN: postgres://engram:engram@localhost:5432/engram?sslmode=disable
          QDRANT_ADDR: localhost:6334
