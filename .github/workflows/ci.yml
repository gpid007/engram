name: CI

# Branching strategy
# ──────────────────
# All work happens on short-lived feature branches (feat/*, fix/*, etc).
# Direct pushes to main are blocked by branch protection.
#
# Workflow:
#   1. Create a feature branch:  git checkout -b feat/my-feature
#   2. Push and open a PR:       git push origin feat/my-feature
#   3. CI runs unit + integration tests on the PR
#   4. When both checks pass, the auto-merge job below enables GitHub
#      auto-merge (rebase strategy). GitHub merges automatically once
#      all required status checks are green — no manual merge needed.
#   5. The feature branch is deleted automatically after merge.
#
# Locally you can also use:  ./scripts/merge-to-main.sh
# which rebases, runs tests via the pre-push hook, then ff-merges to main.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (non-Docker)
        run: |
          go test ./cmd/... -count=1 -timeout 120s
          go test ./internal/chunk/... -count=1 -timeout 120s
          go test ./internal/config/... -count=1 -timeout 120s
          go test ./internal/embed/... -count=1 -timeout 120s
          go test ./internal/fusion/... -count=1 -timeout 120s
          go test ./internal/graph/... -count=1 -timeout 120s
          go test ./internal/httpapi/... -count=1 -timeout 120s
          go test ./internal/mcp/... -count=1 -timeout 120s
          go test ./internal/memory/... -count=1 -timeout 120s
          go test ./internal/rerank/... -count=1 -timeout 120s

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Skip if the commit message contains [skip-integration]
    if: "!contains(github.event.head_commit.message, '[skip-integration]')"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: engram
          POSTGRES_PASSWORD: engram
          POSTGRES_DB: engram
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/engrampass
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 >/dev/null"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 40s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until nc -z localhost 5432; do sleep 1; done'
          timeout 60 bash -c 'until nc -z localhost 6334; do sleep 1; done'
          timeout 120 bash -c 'until nc -z localhost 7687; do sleep 2; done'

      - name: Run integration tests
        run: go test -tags integration ./test/integration/... -v -timeout 300s
        env:
          POSTGRES_DSN: postgres://engram:engram@localhost:5432/engram?sslmode=disable
          QDRANT_ADDR: localhost:6334
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASS: engrampass

  auto-merge:
    name: Auto-merge to main
    # Only runs on PRs targeting main, after both test jobs pass
    needs: [unit, integration]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge (rebase)
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --rebase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
